<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Periscope E2E Application Fixture</title>
  <style>
    #overlay { position: absolute; inset: 0; background: rgba(0,0,0,.05); z-index: 10; }
    .covered-wrap { position: relative; width: 300px; }
  </style>
</head>
<body>
  <h1>Fixture App</h1>
  <p class="msg">hello world</p>
  <p id="long">This paragraph exists to test full text extraction because it is deliberately much longer than the eighty character preview limit used by default.</p>

  <button id="btn" data-testid="fetch-button" onclick="loadItems()">Click me</button>
  <button id="spa-nav" onclick="setTimeout(() => history.pushState({}, '', '/spa-page'), 120)">SPA Nav</button>
  <button id="alerty" onclick="askConfirm()">Ask</button>
  <button id="errbtn" onclick="console.error('boom'); console.log('clicked-err')">Err</button>
  <div id="items"></div>
  <div id="dialog-result"></div>

  <form id="f" action="/submit">
    <input type="text" name="email">
    <input type="text" name="phone">
    <input name="username">
  </form>

  <div class="covered-wrap">
    <input id="covered" name="covered" type="text">
    <div id="overlay"></div>
  </div>

  <!-- Tailwind-style variant classes: invalid as CSS class selectors (issue #3) -->
  <button class="hover:bg-accent [&_svg]:size-4 text-foreground/70">Tailwind Btn</button>

  <!-- shadcn-style form: no id/name, only placeholder / aria-label / nothing (issue #2) -->
  <form id="g" action="/submit">
    <input type="text" placeholder="Vaš e-poštni naslov">
    <input type="text" aria-label="Phone number">
    <input type="text">
  </form>

  <!-- responsive-style hidden duplicate (issue #10): the drawer copy has
       geometry but visibility:hidden; find_element must prefer the visible one -->
  <div style="visibility:hidden"><span class="navdup">Nadzorna plošča</span></div>
  <a href="/dash" class="navdup"><span>Nadzorna plošča</span></a>

  <!-- dense repeated-style markup before a low-contrast table header: the
       contrast sweep must dedupe by style so its budget reaches the header
       (issue #4, reopened) -->
  <div id="hidden-farm"></div>
  <div id="visible-farm"></div>
  <table id="contrast-table">
    <tr><th style="color:#999999;background:#ffffff">Low Contrast Header</th></tr>
  </table>
  <script>
    const farm = document.getElementById('hidden-farm');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('span');
      s.style.display = 'none';
      s.textContent = 'hidden ' + i;
      farm.appendChild(s);
    }
    const vfarm = document.getElementById('visible-farm');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('span');
      s.textContent = 'nav item ' + i + ' ';
      vfarm.appendChild(s);
    }
    const table = document.getElementById('contrast-table');
    for (let i = 0; i < 10; i++) {
      const tr = document.createElement('tr');
      const td = document.createElement('td');
      td.textContent = 'visible cell ' + i;
      tr.appendChild(td);
      table.appendChild(tr);
    }
  </script>

  <script>
    async function loadItems() {
      console.log('fetching items');
      const r = await fetch('/api/items?page=2');
      const data = await r.json();
      document.getElementById('items').textContent = 'items: ' + data.items.join(',');
    }
    function askConfirm() {
      const ok = window.confirm('Proceed?');
      document.getElementById('dialog-result').textContent = ok ? 'accepted' : 'dismissed';
    }
  </script>
</body>
</html>
