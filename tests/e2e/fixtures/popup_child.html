<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Popup Child Fixture Page</title>
</head>
<body>
  <h1 id="msg">CHILD READY</h1>
  <script>
    console.log('child-console-marker');
    // Real apps fetch after parse/mount; an inline-instant fetch can complete
    // before the automation driver even receives the popup event (CI showed
    // this) — no driver can capture earlier than that event.
    setTimeout(() => fetch('/api/items?from=child'), 150);
  </script>
</body>
</html>
