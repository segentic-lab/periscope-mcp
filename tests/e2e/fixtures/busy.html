<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Never Idle Fixture Page Title</title></head><body>
<h1>Busy page</h1>
<p>Simulates Turnstile/websocket-style constant network activity.</p>
<script>
  // networkidle requires 500ms of quiet — this never allows it
  setInterval(() => fetch('/api/items?ping=' + Date.now()).catch(() => {}), 300);
</script>
</body></html>
