name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Compile check
        run: python -m compileall -q server.py runtime.py coercion.py tool_schemas.py handlers/ checks/ tester.py sessions.py interactions.py projects.py auth.py crawler.py utils.py config.py
      - name: Run unit tests
        run: pytest tests/ -v
